# 代理密钥，填写 16 字节 hex，也就是 32 个十六进制字符；也可以带 dd/ee 前缀，程序会自动取 raw secret。
# Proxy secret. Use 16-byte hex, which is 32 hexadecimal characters. dd/ee prefixes are also accepted; the program extracts the raw secret.
secret=0123456789abcdef0123456789abcdef

# classic 模式：输出并接受原始 secret 链接，兼容性高，但更容易被识别。
# Classic mode. Outputs and accepts raw-secret links. More compatible, but easier to detect.
classic=false

# secure 模式：输出并接受 dd + secret 链接，使用 padded intermediate 传输。
# Secure mode. Outputs and accepts dd + secret links using padded intermediate transport.
secure=false

# tls 模式：输出并接受 ee FakeTLS 链接，使用 TLS_DOMAIN 作为混淆域名。
# TLS mode. Outputs and accepts ee FakeTLS links using TLS_DOMAIN as the obfuscation domain.
tls=true

# FakeTLS 混淆域名，仅在 tls=true 时使用。
# FakeTLS obfuscation domain. Used only when tls=true.
TLS_DOMAIN=www.cloudflare.com

# Telegram 广告 tag，16 字节 hex；留空表示不启用 AD_TAG/middle proxy。
# Telegram advertising tag, 16-byte hex. Leave empty to disable AD_TAG/middle proxy.
AD_TAG=

# 服务监听端口；命令行 --port 或环境变量 MTPROXY_PORT 可以覆盖本项。
# Listen port. Can be overridden by --port or the MTPROXY_PORT environment variable.
port=8443

# 连接 Telegram 后端的超时时间，单位毫秒。
# Timeout for connecting to Telegram backend DCs, in milliseconds.
connectTimeoutMillis=5000

# 是否打印连接成功、连接失败和 pipe 异常日志；默认关闭，避免控制台刷屏。
# Whether to print accepted/rejected connection and pipe error logs. Disabled by default to avoid noisy output.
logConnections=false

# 周期性汇总统计打印间隔，单位分钟；默认 20 分钟，设置为 0 可关闭。
# Periodic stats print interval, in minutes. Default is 20 minutes. Set to 0 to disable.
statsPrintPeriodMinutes=20
