name: Build JAR

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build with Maven
        run: mvn -B package

      - name: Run self test
        run: java -cp target/classes:target/test-classes io.github.example.jmtproxy.HandshakeSelfTest

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/jmtproxy-*.jar dist/server.jar

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: java-mtproxy-server
          path: dist/server.jar

      - name: Publish latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if gh release view latest >/dev/null 2>&1; then
            gh release delete latest --yes --cleanup-tag
          fi
          git tag -f latest
          git push -f origin latest
          gh release create latest dist/server.jar --title "Latest build" --notes "Automatic build from $GITHUB_SHA" --latest
