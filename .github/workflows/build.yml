name: Build JAR

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build with Maven
        run: mvn -B package

      - name: Run self test
        run: java -cp target/classes:target/test-classes io.github.example.jmtproxy.HandshakeSelfTest

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/jmtproxy-*.jar dist/server.jar

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: java-mtproxy-server
          path: dist/server.jar
